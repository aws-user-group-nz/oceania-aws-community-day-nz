<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakers - AWS Oceania VCD 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
    <style>
        .speakers-grid-page {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 210px));
            gap: 2rem;
            margin: 2rem auto 0;
            justify-content: center;
            max-width: 1400px;
        }

        .speaker-card-full {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            padding: 1.5rem 1rem;
            border-radius: var(--radius-md);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            background: transparent;
        }

        .speaker-card-full:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            background: var(--color-white);
        }

        .speaker-img-wrapper {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            background: var(--color-light-gray);
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .speaker-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .speaker-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            line-height: 1.3;
        }

        .speaker-title {
            color: var(--color-smile-orange);
            font-size: 0.8rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .speaker-title--empty {
            min-height: 1.12em;
        }
    </style>
</head>

<body>

    <header>
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="favicon.svg" alt="AWS Oceania" style="height: 32px; margin-right: 0.5rem; width: auto;">
                AWS <span>Oceania</span>
            </a>
            <div class="header-actions">
                <nav>
                    <ul id="nav-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="speakers.html" class="active">Speakers</a></li>
                        <li><a href="schedule.html">Schedule</a></li>
                        <li><a href="index.html#sponsors">Sponsors</a></li>
                    </ul>
                </nav>
                <a class="header-icon-btn" href="https://awsug.nz/" target="_blank" rel="noopener noreferrer"
                    aria-label="AWS User Group Aotearoa (opens in new tab)">
                    <img src="assets/images/awsug-aoteraroa-sphere.svg" alt="" width="28" height="28">
                </a>
                <a id="header-github-btn" class="header-icon-btn" href="#" target="_blank"
                    aria-label="GitHub Repository" style="display: none;">
                    <i class="fab fa-github"></i>
                </a>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="mobile-menu-btn" aria-label="Toggle Menu">☰</button>
            </div>
        </div>
    </header>

    <section>
        <div class="container">
            <h1 class="section-title">Our Speakers</h1>
            <p style="text-align: center; max-width: 600px; margin: 0 auto 1rem auto;">
                Meet the cloud experts, builders, and innovators sharing their knowledge at this year's event.
            </p>
            <p
                style="text-align: center; margin-bottom: 3rem; display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; align-items: center;">
                <a href="assets/docs/oceania-community-day-speaker-guide-pack-2026.pdf" target="_blank"
                    rel="noopener noreferrer" class="btn btn-outline" style="font-size: 0.95rem;"><i
                        class="fas fa-file-pdf" aria-hidden="true"></i> Speaker Guide Pack (PDF)</a>
                <a href="assets/docs/oceania-community-day-ppt_v1.pptx" target="_blank" rel="noopener noreferrer"
                    class="btn btn-outline" style="font-size: 0.95rem;"><i class="fas fa-file-powerpoint"
                        aria-hidden="true"></i> Slide template (PPTX)</a>
            </p>

            <div id="speakers-grid-container" class="speakers-grid-page">
                <!-- Injected via JS -->
                <p style="grid-column: 1/-1; text-align: center;">Loading speakers...</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <p>Made with ❤️ by the AWS Community.</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
